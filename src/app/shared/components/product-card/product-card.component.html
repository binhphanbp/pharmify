<a [routerLink]="['/product', product.slug]" class="product-card">
  <!-- Image Area -->
  <div class="product-image-wrapper">
    @if (discountPercent > 0) {
      <span class="discount-badge">Giảm {{ discountPercent }}%</span>
    }
    <img
      [src]="product.image_url || ''"
      [alt]="product.name"
      class="product-image"
      onerror="
        this.src = 'https://placehold.co/200x200/f8f9fa/ccc?text=Pharmify'
      "
    />
  </div>

  <!-- Product Info -->
  <div class="product-info">
    <h3 class="product-name">{{ product.name }}</h3>

    <div class="product-pricing">
      <span class="price-current"> {{ product.price | number: "1.0-0" }} đ</span
      ><span class="price-unit">/{{ product.base_unit_name }}</span>
    </div>

    @if (product.original_price && product.original_price > product.price) {
      <div class="price-old-row">
        <span class="price-old">
          {{ product.original_price | number: "1.0-0" }} đ
        </span>
      </div>
    }

    <button class="btn-buy" (click)="openQuickView($event)">
      <span class="material-icons">add</span> Chọn mua
    </button>
  </div>
</a>

<!-- Quick View Modal -->
@if (showQuickView) {
  <app-quick-view-modal
    [product]="product"
    (close)="closeQuickView()"
  ></app-quick-view-modal>
}
