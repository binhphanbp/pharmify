<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmify - Nhà thuốc tiện lợi</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Dynamic Header -->
  <div id="app-header"></div>

  <main>
    <!-- Hero Slider + Search/Actions Container -->
    <section class="hero-section">
      <div class="hero-slider-container">
        <!-- Slider Images -->
        <div class="hero-slider" id="heroSlider">
          <div class="slide active">
            <img src="assets/images/hero-banner-1.jpg" alt="Banner 1" onerror="this.src='https://images.unsplash.com/photo-1587854692152-cbe660dbde88?w=1920&h=450&fit=crop'">
          </div>
          <div class="slide">
            <img src="assets/images/hero-banner-2.jpg" alt="Banner 2" onerror="this.src='https://images.unsplash.com/photo-1550831107-1553da8c8464?w=1920&h=450&fit=crop'">
          </div>
        </div>
        
        <!-- Slider Controls -->
        <button class="slider-btn prev" id="sliderPrev"><i class="fas fa-chevron-left"></i></button>
        <button class="slider-btn next" id="sliderNext"><i class="fas fa-chevron-right"></i></button>
        <div class="slider-dots" id="sliderDots"></div>
      </div>

      <!-- Quick Actions (Overlapping the slider) -->
      <div class="container hero-quick-actions">
        <div class="search-large">
          <input type="text" placeholder="Tìm kiếm thuốc, bệnh lý, thực phẩm chức năng...">
          <button class="btn-search-large"><i class="fas fa-search"></i></button>
        </div>
        <div class="action-cards d-flex">
          <a href="#" class="action-card">
            <div class="icon-circle"><i class="fas fa-file-prescription text-primary"></i></div>
            <span>Đặt đơn thuốc</span>
          </a>
          <a href="#" class="action-card">
            <div class="icon-circle"><i class="fas fa-user-md text-primary"></i></div>
            <span>Liên hệ Dược sĩ</span>
          </a>
          <a href="#" class="action-card">
            <div class="icon-circle"><i class="fas fa-store text-primary"></i></div>
            <span>Tìm nhà thuốc</span>
          </a>
        </div>
      </div>
    </section>

    <!-- Promo Banners (2 columns) -->
    <section class="promo-banners bg-gray section-padding">
      <div class="container d-flex gap-20">
        <div class="promo-card" style="flex:1">
          <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=600&h=200&fit=crop" alt="Promo 1" style="width:100%; border-radius:12px; height:200px; object-fit:cover;">
        </div>
        <div class="promo-card" style="flex:1">
          <img src="https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?w=600&h=200&fit=crop" alt="Promo 2" style="width:100%; border-radius:12px; height:200px; object-fit:cover;">
        </div>
      </div>
    </section>

    <!-- Services Bar -->
    <section class="services-bar bg-white">
      <div class="container d-flex justify-content-between align-items-center py-20">
        <div class="service-item text-center">
          <img src="https://cdns.iconmonstr.com/wp-content/releases/preview/2012/240/iconmonstr-plus-square-1.png" width="40" alt="Icon">
          <p class="mt-10 mb-0 font-weight-500">Thuốc</p>
        </div>
        <div class="service-item text-center">
          <img src="https://cdns.iconmonstr.com/wp-content/releases/preview/2012/240/iconmonstr-medical-3.png" width="40" alt="Icon">
          <p class="mt-10 mb-0 font-weight-500">Khám bệnh</p>
        </div>
        <div class="service-item text-center">
          <img src="https://cdns.iconmonstr.com/wp-content/releases/preview/2012/240/iconmonstr-first-aid-kit-1.png" width="40" alt="Icon">
          <p class="mt-10 mb-0 font-weight-500">Thiết bị Y tế</p>
        </div>
        <div class="service-item text-center">
          <img src="https://cdns.iconmonstr.com/wp-content/releases/preview/2012/240/iconmonstr-shield-20.png" width="40" alt="Icon">
          <p class="mt-10 mb-0 font-weight-500">Bảo hiểm</p>
        </div>
        <div class="service-item text-center">
          <img src="https://cdns.iconmonstr.com/wp-content/releases/preview/2012/240/iconmonstr-flask-7.png" width="40" alt="Icon">
          <p class="mt-10 mb-0 font-weight-500">Xét nghiệm</p>
        </div>
        <div class="service-item text-center">
          <img src="https://cdns.iconmonstr.com/wp-content/releases/preview/2014/240/iconmonstr-baby-1.png" width="40" alt="Icon">
          <p class="mt-10 mb-0 font-weight-500">Mẹ & Bé</p>
        </div>
      </div>
    </section>

    <!-- Flash Sale -->
    <section class="flash-sale section-padding">
      <div class="container">
        <div class="section-header d-flex justify-content-between align-items-center mb-20">
          <div class="d-flex align-items-center gap-15">
            <h2 class="section-title text-orange mb-0 d-flex align-items-center gap-10">
              <i class="fas fa-bolt"></i> GIỜ VÀNG GIÁ SỐC
            </h2>
            <div class="countdown" id="flashSaleCountdown">
              <span class="cd-box">00</span> :
              <span class="cd-box">00</span> :
              <span class="cd-box">00</span>
            </div>
          </div>
          <a href="#" class="view-all">Xem tất cả <i class="fas fa-chevron-right"></i></a>
        </div>
        
        <div class="product-slider-wrapper position-relative">
          <button class="slider-btn prev btn-product-prev"><i class="fas fa-chevron-left"></i></button>
          <div class="product-slider-inner d-flex gap-20 overflow-hidden" id="hotProductsList">
            <!-- Rendered via JS -->
          </div>
          <button class="slider-btn next btn-product-next"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
    </section>

    <!-- Sản phẩm mới (New Products) -->
    <section class="new-products bg-gray section-padding">
      <div class="container">
        <div class="section-header d-flex justify-content-between align-items-center mb-20">
          <h2 class="section-title mb-0">Sản phẩm mới</h2>
          <a href="#" class="view-all">Xem tất cả <i class="fas fa-chevron-right"></i></a>
        </div>
        
        <div class="product-grid" id="newProductsList">
          <!-- Rendered via JS -->
        </div>
      </div>
    </section>

    <!-- Category Grid -->
    <section class="category-grid-section section-padding">
      <div class="container">
        <h2 class="section-title text-center mb-30">Danh mục mua hàng</h2>
        <div class="categories-wrapper d-flex flex-wrap gap-20 justify-content-center" id="homepageCategories">
          <!-- Rendered via JS -->
        </div>
      </div>
    </section>

    <!-- Brands -->
    <section class="brands-section bg-gray section-padding">
      <div class="container">
        <h2 class="section-title text-center mb-30">Thương hiệu nổi bật</h2>
        <div class="brands-grid d-flex flex-wrap gap-20 justify-content-center" id="homepageBrands">
          <!-- Rendered via JS -->
        </div>
      </div>
    </section>
  </main>

  <!-- Dynamic Footer -->
  <div id="app-footer"></div>

  <!-- Back to top -->
  <button id="backToTop" class="btn-back-top"><i class="fas fa-arrow-up"></i></button>
  
  <!-- Global Add to Cart Toast Notification -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Scripts -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
