<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập / Đăng ký - Pharmify</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .login-container {
      max-width: 500px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid #eee;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 18px 0;
      font-size: 16px;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    .auth-tab.active {
      color: #004DA0;
      border-bottom-color: #004DA0;
    }
    .auth-tab:hover:not(.active) {
      background: #fcfcfc;
      color: #333;
    }

    .auth-content {
      padding: 40px 30px;
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }
    .form-control {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-control:focus {
      border-color: #004DA0;
    }
    
    .password-wrapper {
      position: relative;
    }
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #004DA0;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 10px;
    }
    .btn-submit:hover {
      background: #003366;
    }
    
    .auth-links {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 14px;
    }
    .auth-links a {
      color: #004DA0;
      text-decoration: none;
    }
    .auth-links a:hover {
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #999;
      margin: 30px 0;
      font-size: 14px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #eee;
    }
    .divider::before { margin-right: 15px; }
    .divider::after { margin-left: 15px; }

    .social-login {
      display: flex;
      gap: 15px;
    }
    .btn-social {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.3s;
    }
    .btn-social:hover {
      background: #f5f5f5;
    }
    .btn-social img {
      width: 20px;
      height: 20px;
    }

  </style>
</head>
<body>

  <!-- Dynamic Header -->
  <div id="app-header"></div>

  <main class="bg-gray pt-40 pb-60">
    <div class="container">
      
      <div class="login-container">
        
        <div class="auth-tabs">
          <div class="auth-tab active" data-target="loginForm">Đăng nhập</div>
          <div class="auth-tab" data-target="registerForm">Đăng ký</div>
        </div>

        <div class="auth-content">
          
          <!-- Login Form -->
          <form id="loginForm" class="auth-form active">
            <div class="form-group">
              <label>Số điện thoại / Email</label>
              <input type="text" class="form-control" placeholder="Nhập số điện thoại hoặc email">
            </div>
            
            <div class="form-group">
              <label>Mật khẩu</label>
              <div class="password-wrapper">
                <input type="password" class="form-control pw-input" placeholder="Nhập mật khẩu">
                <i class="fas fa-eye toggle-password"></i>
              </div>
            </div>

            <button type="button" class="btn-submit" onclick="demoLogin()">ĐĂNG NHẬP</button>
            
            <div class="auth-links">
              <label style="cursor: pointer; font-size: 14px; color: #555;">
                <input type="checkbox" style="margin-right: 5px;"> Nhớ mật khẩu
              </label>
              <a href="#">Quên mật khẩu?</a>
            </div>
          </form>

          <!-- Register Form -->
          <form id="registerForm" class="auth-form">
            <div class="form-group">
              <label>Họ và tên</label>
              <input type="text" class="form-control" placeholder="Nhập họ và tên">
            </div>
            
            <div class="form-group">
              <label>Số điện thoại</label>
              <input type="tel" class="form-control" placeholder="Nhập số điện thoại">
            </div>

            <div class="form-group">
              <label>Mật khẩu</label>
              <div class="password-wrapper">
                <input type="password" class="form-control pw-input" placeholder="Nhập mật khẩu">
                <i class="fas fa-eye toggle-password"></i>
              </div>
            </div>
            
            <div class="form-group">
              <label>Xác nhận mật khẩu</label>
              <div class="password-wrapper">
                <input type="password" class="form-control pw-input" placeholder="Nhập lại mật khẩu">
                <i class="fas fa-eye toggle-password"></i>
              </div>
            </div>

            <button type="button" class="btn-submit" onclick="demoLogin()">ĐĂNG KÝ</button>
            
            <div style="font-size: 13px; color: #666; text-align: center; margin-top: 15px; line-height: 1.5;">
              Bằng việc đăng ký, bạn đồng ý với các <a href="#" style="color: #004DA0;">Điều khoản sử dụng</a> và <a href="#" style="color: #004DA0;">Chính sách bảo mật</a> của Pharmify.
            </div>
          </form>

          <!-- Social Login -->
          <div class="divider">Hoặc đăng nhập bằng</div>
          <div class="social-login">
             <!-- Placeholder for Google Logo visually matching -->
            <button type="button" class="btn-social">
              <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
              Google
            </button>
            <button type="button" class="btn-social" style="color: #1877F2; border-color: #1877F2;">
              <i class="fab fa-facebook fa-lg"></i>
              Facebook
            </button>
          </div>

        </div>

      </div>

    </div>
  </main>

  <!-- Dynamic Footer -->
  <div id="app-footer"></div>
  
  <button id="backToTop" class="btn-back-top"><i class="fas fa-arrow-up"></i></button>

  <!-- Scripts -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/main.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Tab switching logic
      const tabs = document.querySelectorAll('.auth-tab');
      const forms = document.querySelectorAll('.auth-form');

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          // Remove active from all
          tabs.forEach(t => t.classList.remove('active'));
          forms.forEach(f => f.classList.remove('active'));
          
          // Add active to clicked
          tab.classList.add('active');
          const targetId = tab.getAttribute('data-target');
          document.getElementById(targetId).classList.add('active');
        });
      });

      // Toggle password visibility
      const toggleIcons = document.querySelectorAll('.toggle-password');
      toggleIcons.forEach(icon => {
        icon.addEventListener('click', function() {
          const input = this.previousElementSibling;
          if (input.type === 'password') {
            input.type = 'text';
            this.classList.remove('fa-eye');
            this.classList.add('fa-eye-slash');
          } else {
            input.type = 'password';
            this.classList.remove('fa-eye-slash');
            this.classList.add('fa-eye');
          }
        });
      });

      // Make demoLogin globally available
      window.demoLogin = function() {
        alert("Tính năng Đăng nhập/Đăng ký đang trong quá trình hoàn thiện. Xin cảm ơn!");
      };
    });
  </script>
</body>
</html>
