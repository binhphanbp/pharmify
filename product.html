<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết sản phẩm - Pharmify</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .product-detail-container {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .product-gallery {
      position: relative;
      background: #fcfcfc;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      border: 1px solid #eee;
    }
    .product-gallery img {
      max-width: 100%;
      height: 400px;
      object-fit: contain;
    }
    .product-badges-large {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .badge-large {
      padding: 5px 12px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      color: white;
    }
    .product-info-panel h1 {
      font-size: 24px;
      font-weight: 700;
      color: #333;
      margin-bottom: 15px;
      line-height: 1.4;
    }
    .brand-id {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .price-box {
      background: #f8faff;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 25px;
      border: 1px solid rgba(0,77,160,0.1);
    }
    .current-price {
      font-size: 32px;
      font-weight: 800;
      color: #004DA0;
    }
    .old-price {
      font-size: 18px;
      color: #999;
      text-decoration: line-through;
      margin-left: 15px;
    }
    .quantity-selector {
      display: inline-flex;
      align-items: center;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
      margin-right: 20px;
    }
    .quantity-selector button {
      background: #f5f5f5;
      border: none;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
    }
    .quantity-selector input {
      width: 50px;
      height: 40px;
      border: none;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
      text-align: center;
      font-weight: bold;
      font-size: 16px;
      outline: none;
    }
    .add-cart-large {
      padding: 12px 40px;
      font-size: 18px;
      border-radius: 30px;
    }
    .product-description {
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 40px;
    }
    .product-description h3 {
      font-size: 20px;
      color: #004DA0;
      border-bottom: 2px solid #004DA0;
      display: inline-block;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .desc-content {
      line-height: 1.8;
      color: #444;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <!-- Dynamic Header -->
  <div id="app-header"></div>

  <main class="bg-gray pt-20 pb-40">
    <div class="container">
      
      <!-- Breadcrumb -->
      <div class="breadcrumb mb-20">
        <a href="index.html">Trang chủ</a>
        <span class="separator"><i class="fas fa-chevron-right" style="font-size:10px"></i></span>
        <a href="category.html" id="bcCategory">Danh mục</a>
        <span class="separator"><i class="fas fa-chevron-right" style="font-size:10px"></i></span>
        <span id="bcProduct">Sản phẩm</span>
      </div>

      <!-- Main Product Area -->
      <div class="product-detail-container">
        <div class="row d-flex flex-wrap" style="margin: 0 -15px;">
          
          <!-- Gallery -->
          <div class="col-md-5" style="width: 40%; padding: 0 15px;">
            <div class="product-gallery">
              <div class="product-badges-large" id="productBadges">
                <!-- Badges -->
              </div>
              <img id="productImage" src="https://via.placeholder.com/400" alt="Product">
            </div>
            
            <div class="policy-features mt-20 d-flex justify-content-between text-center" style="font-size:13px; color:#555;">
              <div><i class="fas fa-check-circle text-success fa-2x mb-10"></i><br>100% Chính hãng</div>
              <div><i class="fas fa-sync-alt text-primary fa-2x mb-10"></i><br>Đổi trả 30 ngày</div>
              <div><i class="fas fa-truck text-orange fa-2x mb-10"></i><br>Freeship 300k</div>
            </div>
          </div>

          <!-- Info -->
          <div class="col-md-7" style="width: 60%; padding: 0 15px;">
            <div class="product-info-panel">
              <h1 id="productName">Đang tải sản phẩm...</h1>
              <div class="brand-id d-flex gap-15">
                <span>Mã SP: <strong id="productID">0000</strong></span>
                <span>Thương hiệu: <strong id="productBrand" class="text-primary">Đang cập nhật</strong></span>
                <span>Tình trạng: <strong class="text-success">Còn hàng</strong></span>
              </div>

              <div class="price-box">
                <span class="current-price" id="productPrice">0 đ</span>
                <span class="old-price" id="productOldPrice"></span>
                <div class="mt-10" style="color: #666; font-size: 14px;">Quy cách: <strong id="productUnit"></strong></div>
              </div>

              <div class="action-box d-flex align-items-center mt-30">
                <div class="quantity-selector">
                  <button onclick="changeQty(-1)"><i class="fas fa-minus"></i></button>
                  <input type="number" id="detailQty" value="1" min="1" max="99">
                  <button onclick="changeQty(1)"><i class="fas fa-plus"></i></button>
                </div>
                <button class="btn btn-primary add-cart-large" id="btnAddToCart">
                  <i class="fas fa-shopping-cart"></i> THÊM VÀO GIỎ HÀNG
                </button>
              </div>
              
              <div class="mt-30" style="padding-top: 20px; border-top: 1px dashed #ccc;">
                <p><strong><i class="fas fa-phone-alt text-primary"></i> Gọi đặt mua:</strong> 1800 6821 (Miễn phí, 7h00 - 22h00)</p>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Description -->
      <div class="product-description">
        <h3>Mô tả sản phẩm</h3>
        <div class="desc-content" id="productDesc">
          Đang cập nhật mô tả...
        </div>
      </div>

      <!-- Related -->
      <section class="related-products mt-40">
        <h2 class="section-title mb-20 d-flex justify-content-between align-items-center">
          Sản phẩm liên quan
          <a href="#" class="view-all">Xem tất cả <i class="fas fa-chevron-right"></i></a>
        </h2>
        <div class="product-grid" id="relatedProductsList">
          <!-- Rendered via JS -->
        </div>
      </section>

    </div>
  </main>

  <!-- Dynamic Footer -->
  <div id="app-footer"></div>
  
  <button id="backToTop" class="btn-back-top"><i class="fas fa-arrow-up"></i></button>
  <div id="toastContainer" class="toast-container"></div>

  <!-- Scripts -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/product.js"></script>
</body>
</html>
