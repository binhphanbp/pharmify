<div class="skeleton-wrapper" [class]="type">
  @if (type === 'product-card') {
    <div class="skeleton-card p-3 h-100 d-flex flex-column">
      <div class="skeleton-img mb-3"></div>
      <div class="skeleton-text w-100 mb-2"></div>
      <div class="skeleton-text w-75 mb-3"></div>
      <div class="skeleton-text skeleton-price mt-auto"></div>
      <div class="skeleton-button w-100 mt-3"></div>
    </div>
  }
  @if (type === 'category-icon') {
    <div class="skeleton-category d-flex flex-column align-items-center gap-2">
      <div class="skeleton-circle"></div>
      <div class="skeleton-text w-75"></div>
    </div>
  }
  @if (type === 'banner') {
    <div class="skeleton-banner w-100"></div>
  }
</div>
