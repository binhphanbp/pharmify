<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh mục sản phẩm - Pharmify</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .category-layout {
      display: flex;
      gap: 30px;
    }
    .sidebar-filter {
      width: 250px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      align-self: flex-start;
    }
    .main-content {
      flex-grow: 1;
    }
    .filter-group {
      margin-bottom: 25px;
    }
    .filter-group:last-child {
      margin-bottom: 0;
    }
    .filter-title {
      font-weight: 700;
      margin-bottom: 15px;
      font-size: 16px;
      color: #333;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .filter-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .filter-list li {
      margin-bottom: 12px;
    }
    .filter-list label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 14px;
      color: #555;
    }
    .filter-list input[type="radio"],
    .filter-list input[type="checkbox"] {
      margin-right: 10px;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .filter-list label:hover {
      color: #004DA0;
    }
    .category-header {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .category-title {
      font-size: 20px;
      font-weight: 700;
      color: #333;
      margin: 0;
    }
    .sort-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sort-select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      outline: none;
      font-size: 14px;
      background: white;
    }
    
    /* Modify Grid specifically for category page (4 cols instead of 5) */
    .product-grid {
      grid-template-columns: repeat(4, 1fr);
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 40px;
    }
    .page-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid #ddd;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .page-btn.active, .page-btn:hover {
      background: #004DA0;
      color: white;
      border-color: #004DA0;
    }
    
    .empty-state {
      text-align: center;
      padding: 50px 0;
      background: white;
      border-radius: 12px;
    }
    .empty-state i {
      font-size: 50px;
      color: #ccc;
      margin-bottom: 20px;
    }
    
    @media (max-width: 992px) {
      .category-layout {
        flex-direction: column;
      }
      .sidebar-filter {
        width: 100%;
      }
      .product-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .category-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }
    }
    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <!-- Dynamic Header -->
  <div id="app-header"></div>

  <main class="bg-gray pt-20 pb-40">
    <div class="container">
      
      <!-- Breadcrumb -->
      <div class="breadcrumb mb-20">
        <a href="index.html">Trang chủ</a>
        <span class="separator"><i class="fas fa-chevron-right" style="font-size:10px"></i></span>
        <span id="bcCategoryName">Tất cả sản phẩm</span>
      </div>

      <div class="category-layout">
        
        <!-- Sidebar Filter -->
        <aside class="sidebar-filter">
          
          <div class="filter-group">
            <h3 class="filter-title">Danh mục</h3>
            <ul class="filter-list" id="filterCategoryList">
              <!-- Rendered via JS -->
            </ul>
          </div>
          
          <div class="filter-group">
            <h3 class="filter-title">Giá</h3>
            <ul class="filter-list">
              <li><label><input type="radio" name="price" value="all" checked> Tất cả</label></li>
              <li><label><input type="radio" name="price" value="under100"> Dưới 100.000đ</label></li>
              <li><label><input type="radio" name="price" value="100to300"> 100.000đ - 300.000đ</label></li>
              <li><label><input type="radio" name="price" value="300to500"> 300.000đ - 500.000đ</label></li>
              <li><label><input type="radio" name="price" value="above500"> Trên 500.000đ</label></li>
            </ul>
          </div>

        </aside>

        <!-- Main Content -->
        <div class="main-content">
          
          <div class="category-header">
            <h1 class="category-title" id="pageCategoryTitle">Tất cả sản phẩm</h1>
            <div class="sort-control">
              <span>Sắp xếp:</span>
              <select class="sort-select" id="sortSelect">
                <option value="default">Mặc định</option>
                <option value="price-asc">Giá: Thấp đến cao</option>
                <option value="price-desc">Giá: Cao đến thấp</option>
                <option value="name-asc">Tên: A - Z</option>
              </select>
            </div>
          </div>

          <div id="productContainer">
            <div class="product-grid" id="categoryProductList">
              <!-- Rendered via JS -->
            </div>
            
            <!-- Pagination -->
            <!-- <div class="pagination" id="pagination">
              <button class="page-btn"><i class="fas fa-chevron-left"></i></button>
              <button class="page-btn active">1</button>
              <button class="page-btn">2</button>
              <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
            </div> -->
          </div>

        </div>

      </div>
      
    </div>
  </main>

  <!-- Dynamic Footer -->
  <div id="app-footer"></div>
  
  <button id="backToTop" class="btn-back-top"><i class="fas fa-arrow-up"></i></button>
  <div id="toastContainer" class="toast-container"></div>

  <!-- Scripts -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/category.js"></script>
</body>
</html>
